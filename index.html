<!DOCTYPE html>
<html>
<head>
  <title>Loading...</title>
  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      font-family: Arial;
      text-align: center;
    }

    #overlay {
      position: absolute;
      width: 100%;
      height: 100vh;
      background: black;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      cursor: pointer;
      z-index: 10;
    }

    video {
      width: 100%;
      height: 100vh;
      object-fit: cover;
      display: none;
    }
  </style>
</head>

<body>

<div id="overlay">📄 Tap to open Problem Statement</div>

<video id="vid">
  <source src="video.mp4" type="video/mp4">
</video>

<script>
  const overlay = document.getElementById("overlay");
  const video = document.getElementById("vid");

  overlay.addEventListener("click", () => {
    overlay.style.display = "none";
    video.style.display = "block";
    video.play();
  });
</script>

</body>
</html>
